- id: robichaudStoriesStonesImagining
  abstract: >-
    Stories of the Stones explores how ancient monuments – standing stones,
    megaliths and earthworks – have been reimagined across the centuries in
    folklore, literature, art and popular culture. From medieval myths to
    Romantic fascination and from folk-horror cinema to Julian Cope, the
    powerful stories inspired by these enigmatic sites reflect the beliefs and
    anxieties of each era. Spanning Britain, Ireland and Brittany, the book
    includes iconic places such as Stonehenge and Newgrange, as well as
    lesser-known sites steeped in local lore. While the monuments' original
    meanings remain mysterious, our interpretations reveal deep emotional and
    cultural connections to the ancient landscape. Richly illustrated and
    wide-ranging, this book is ideal for readers interested in prehistoric
    monuments, storytelling traditions and the enduring power of place.
