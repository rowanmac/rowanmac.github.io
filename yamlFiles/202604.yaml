- id: erdosIrelandCommonwealth1960s1970s2026
  abstract: >-
    Although Ireland enjoyed a strong – albeit ultimately informal – external
    association with the Commonwealth in 1960, this was at an end by 1979. It
    had abolished all migration exemptions for Commonwealth citizens and the
    special status Irish citizens still enjoyed in some Commonwealth countries
    had become at most almost entirely symbolic. Ireland no longer granted or
    received trade preferences based on ‘Commonwealth’ status and it had severed
    its relationship with Sterling to join the European Exchange Rate Mechanism.
    Ireland was no longer an associate of any Commonwealth body and no longer
    participated significantly in Commonwealth fora. However, although the
    Sterling rupture highlights how Europeanisation could be disruptive even
    here, new arrangements had almost invariably been established with the UK –
    thus highlighting that the ends of Irish Commonwealth association were
    always primarily focused on this special, although complex, relationship.
    Ireland’s Commonwealth disassociation primarily traces to the demise of a
    tangible Commonwealth citizenship and economic framework. At the same time,
    the Commonwealth experienced a substantial expansion in development
    cooperation and emerged as a significant North/South (or West/South) forum.
    Whilst this could have synergised well with Ireland as a Global Citizen, its
    adoption of a narrowly self-interested approach to its Commonwealth linkages
    rendered this otiose and ensured the end of its informal external
    association.
