- id: dormanBritishArmySociety2026
  abstract: >-
    A comprehensive overview of the British army in Ireland in the eighteenth
    century and the army's relationship with the local population. The
    eighteenth-century army in Ireland, which consisted of 12,000 to 15,000 men,
    and which was its own quasi-independent "Establishment", paid for, housed
    by, and commanded from Dublin, represented a significant proportion of
    overall British military forces. This book, based on extensive original
    research, presents an overview of army life in Ireland in the period. It
    covers the administration of the Irish Establishment, recruitment,
    desertion, criminality, drunkenness, everyday routines, soldier-civilian
    relations, the response of soldiers to growing revolutionary unrest, and
    more. It overturns much established thinking, demonstrating for example that
    desertion in the army in Ireland was no different from desertion in the army
    elsewhere, that the army in Ireland was well-trained and efficient, and that
    Irish soldiers were far more common in British service than previously
    thought. In addition, the book discusses ideas of masculinity, the army's
    place in the defence of Ireland against foreign invasion, in securing the
    ascendancy regime and in suppressing unrest, and the unusual situation of
    Ireland as both subject and participant in the development of the British
    empire.
