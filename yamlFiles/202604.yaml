- id: tanCrisesOpportunitiesIrish2026
  abstract: >-
    The Bruce invasion (1315–18) had a profound impact on the Irish royal towns,
    presenting both crises and opportunities. This study examines fiscal data
    from the Irish receipt rolls and administrative evidence from memoranda
    rolls to assess how the six royal towns navigated the invasion’s social
    challenges. While towns in Leinster endured significant economic decline,
    southern urban centres like Cork and Waterford fared relatively better. In
    response, municipal governments mobilized resources, fortified defences, and
    petitioned the crown for remissions and liberties. These efforts not only
    supported their survival during the conflict but also facilitated the
    expansion of urban autonomy in the post-invasion period.
