    , This book is something a labour of love in which Neasa MacErlean stakes a
    claim for her maternal grandfather Robert Dudley Edwards (1909–1988), to be
    accorded greater recognition for his work and achievements than has been
    conceded to him heretofore. MacErlean details how her grandfather made his
    contribution to the betterment of society through teaching, publishing, and
    extramural lecturing, as well as through cajoling those who happened to be
    in power in state, Church, and academia to support the various enterprises
    [End Page 619] he espoused. Much of the book concerns what Edwards did
    accomplish, but MacErlean also explains that he remained keenly aware that
    his achievements fell short of his ambitions and that his interpersonal
    behaviour was sometimes questionable. She is in a position to tabulate his
    regrets because she draws not only on the recollections of family members,
    colleagues, and former pupils, but also on the voluminous notes and diaries,
    many of them confessional, that Edwards left to posterity., In reviewing
    this book, I should state that I was never taught by R. Dudley Edwards and
