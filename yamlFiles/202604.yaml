- id: ablettRidingWavesChange2026
  abstract: >-
    While surfing in Ireland is a sport on the ascendancy, both in terms of
    recreational and competitive participants, a great deal more work needs to
    be done on the sport’s origin within the country. This is especially the
    case for women’s surfing on the island. Irish women entered surfing from the
    1960s onwards, with the role of geography, family networks, and equipment
    access shaping participation patterns. Women’s entry mechanisms into surfing
    was historically entrenched in masculine cultures. Irish female surfers have
    navigated, challenged, and reshaped the boundaries of this sport in many
    ways, delineating how Ireland’s surfing narrative, whilst rooted in its
    distinct coastal communities, has been part of global surfing cultures.
    Women who successfully entered Irish surfing navigated informal barriers,
    revealing mechanisms of exclusion that operated differently from
    institutional prohibition while demonstrating how Ireland’s peripheral
    position necessitated immediate engagement with global surfing networks.
