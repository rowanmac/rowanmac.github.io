- id: scottQueerScrapbookBritain2026
  abstract: >-
    A beautifully illustrated compendium of LGBTIQ+ life, A Queer Scrapbook
    offers a rich archive of histories from across Britain and Ireland. Brimming
    with interviews, newspaper clippings, photographs, and flyers, it traces
    urban, rural, and regional queer experiences from 1945 to the present.
    Commentaries and short essays introduce a changing queer landscape,
    organised around four themes: home and family, socialising and sex, arts and
    culture, and activism and community. The book explores domestic life and
    parenting, reveals the unexpected places where LGBTIQ+ people gathered for
    fun, highlights the importance of creative expression, and documents
    campaigns for justice and equal rights. Rooted in the tradition of
    collecting as a way for marginalised people to assert identity and
    community, A Queer Scrapbook vividly captures the diversity of queer and
    trans lives across the British and Irish isles since the Second World War.
