- id: dworskiHistoryForgottenDiaspora2026
  abstract: >-
    This article offers the first systematic historical and sociological
    examination of the Polish diaspora in post-war Ireland, focusing on the
    period during which the Irish government continued to recognise the Polish
    government-in-exile in London (until 1957). It identifies and analyses
    Polish citizens who consciously chose political exile, most of whom came
    from intellectual and aristocratic circles. Drawing on quantitative data and
    biographical evidence, the study reconstructs their social and professional
    backgrounds and situates them within the broader context of Ireland's
    post-war migration policy toward refugees from Central and Eastern Europe.
    The findings suggest that while Ireland demonstrated a limited openness to
    post-war Polish migration, this tolerance was largely confined to members of
    the higher social strata. Applicants from working-class backgrounds faced
    considerable administrative barriers, including frequent refusals of entry
    visas. The article further reveals that the Polish community in Ireland
    remained small and socially reserved, displaying minimal political or civic
    engagement. Exceptions were found among Polish students who contributed to
    academic and cultural life in Irish institutions. Overall, the diaspora
    tended to view its presence on the island as temporary, leading most
    members, after several years, to continue their migration elsewhere
