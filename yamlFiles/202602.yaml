- id: ebbinghausCelticArtAges2026
  abstract: "A sweeping introduction to the history of Celtic art, from its ancient origins to its reinterpretation and revival in modern times \_ The history of the populations who have traditionally been called Celts is expansive, reaching back to antiquity and covering a large swath of central and western Europe. Celtic Art Across the Ages tells the epic story of the creativity and artistic legacies of these peoples. This comprehensive and beautifully illustrated volume begins in the first millennium BCE, when elaborate personal ornaments, arms and armor, horse gear, chariots, and feasting wares were buried at sites since brought to light by archaeological excavations spanning the European continent. As the essays move through the medieval period and beyond, readers are treated to a material record as diverse as the populations encompassed by the elusive label “Celtic”: carefully crafted objects made of metals, glass, terra-cotta, and wood; rare examples of ancient textiles; manuscripts; and coins. The volume also addresses significant instances of reception, reinterpretation, and revival in the modern era. \_ Distributed for Harvard Art Museums \_Exhibition Schedule: \_Harvard Art Museums, Cambridge, MA (March 6–August 2, 2026)"
