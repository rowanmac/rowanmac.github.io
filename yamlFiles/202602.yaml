- id: torranceIrishMigrationsClassical2026
  abstract: >-
    Why should classical antiquity matter to Irish migration? Irish Migrations
    and Classical Antiquity argues that ancient Greece and Rome have shaped
    Irish migration narratives from the earliest texts to the 21st century.
    These classical models emerge in response to four key drivers of migration:
    war, economic need, religious motivation and the pursuit of education.
    Rather than passive inheritances, Graeco-Roman forms are used both to join
    and to challenge dominant frameworks, offering tools for cultural
    participation and strategies of resistance to exclusion.The book traces
    classical reception in contexts ranging from early Irish origin legends and
    medieval Latin learning to 21st-century cultural politics, including
    Irish-language translation, diaspora literature and gendered experiences.
    Participation appears in assertions of Irish civilisation, synchronistic
    histories, literary cosmopolitanism and transnational exchange. Resistance
    surfaces in critiques of marginalisation, defence of minority languages and
    challenges to aesthetic or political canons. This book rethinks how Irish
    identities travel across borders, languages and centuries by showing how the
    ancient world underwrites both movement and its meanings. The ebook editions
    of this book are available open access under a CC BY-NC-ND 4.0 licence on
    bloomsburycollections.com. Open access was funded by the European Research
    Council.
