- id: crottyIrishTricolourTruth2026
  abstract: >-
    This nationally important book reveals the untold story of the Irish
    tricolour: its true origins, a forgotten heroine, and the emblems it
    replaced. For the first time, a fully referenced history corrects
    long-standing myths and slurs surrounding Ireland’s national flag. It also
    reinterprets iconic Irish symbols ― from the harp and shamrock to the
    tri-spiral ― placing them within the broader journey toward Irish nationhood
    and national identity. Along Ireland’s road to a republic, key figures are
    restored to their rightful place ― from Owen Roe O’Neill and Wolfe Tone to
    Thomas Meagher and Padraig Pearse.The book explores crucial turning points ―
    the rise of green as Ireland’s colour, the rebellions of 1642, 1798, 1848,
    and 1916, Catholic Emancipation, and the flag’s later use ― and misuse. A
    bold, insightful retelling of Ireland’s story through its symbols.
