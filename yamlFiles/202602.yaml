- id: kerrFalklandsFactorSour2026
  abstract: >-
    This article examines the misunderstood role of the Falklands War in
    reshaping Anglo-Irish relations at a critical moment in the early 1980s.
    Rather than setting Anglo-Irish relations on a new trajectory, it argues
    that the crisis consolidated and deepened divisions that had emerged during
    the 1980–81 hunger strikes, closing the pathway towards an intergovernmental
    settlement of the Northern Ireland conflict. It shows how Haughey’s
    Falklands-era diplomacy was not anomalous but formed part of a domestic
    political strategy: he sought to use Anglo-Irish relations—and Northern
    Ireland in particular—as a lever to stabilise a precarious minority
    government and secure a governing mandate. Thatcher interpreted the Irish
    Government’s actions during the crisis as confirmation that Dublin was a
    high-risk partner.1 Haughey’s efforts to assert Ireland’s sovereignty and
    political relevance therefore placed strain on Anglo-Irish relations, while
    reinforcing Thatcher’s instinctive reluctance to pursue far-reaching
    political engagement. It demonstrates that the Falklands War marked a
    turning point in British and Irish thinking about Northern Ireland. By
    hardening mistrust and legitimising a cautious, security-first approach to
    intergovernmental cooperation, the crisis foreclosed the prospect of an
    ‘agreed Ireland’ between the two governments and helped shape the narrower
    framework of Anglo-Irish diplomacy that followed.
