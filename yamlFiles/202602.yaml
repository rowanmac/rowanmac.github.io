- id: lawlorLittleHistoryWicklow2026
  abstract: >-
    County Wicklow’s landscape is dotted with pre-Christian sites – Baltinglass
    is known as the ‘Hillfort Capital of Ireland’. Saint Patrick landed in
    Wicklow in 432 AD and the county also boasts ecclesiastical sites, the most
    impressive being Glendalough. Following the Anglo-Norman invasion of
    1169–70, Normans occupied the lowlands, but native Irish inhabited the
    uplands, leading to conflict throughout the Middle Ages. Wicklow became the
    last county to be shired in 1606.Wicklow witnessed more violence through the
    seventeenth century, and it was only after 1700 that the elite felt safe
    enough to build great houses such as Powerscourt and Russborough. Wicklow
    was in turmoil during the 1798 rebellion. Economic recovery was halted by
    the tragedy of Famine. Later in the nineteenth century, the Parnells led the
    Home Rule movement, the Land League and the Ladies’ Land League. The
    twentieth century saw war, revolution and hardship before better times
    arrived after 1960.Meticulously researched, this clear, user-friendly book
    is an invaluable resource which will appeal to everyone interested in the
    history of County Wicklow.
