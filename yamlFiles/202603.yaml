- id: pulliamArtNatureBody2026
  abstract: "How did the living world – bodies, time, motion, and natural environment – frame the art of early medieval Britain and Ireland? In this study, Heather Pulliam investigates\_how the early medieval art produced in Britain and Ireland enabled Christian audiences to unite with and be 'dissolved' in an intangible divinity. Using phenomenological and eco-critical methodologies, she probes intersections between art objects, the living world, and the embodied eye. Pulliam analyses a range of objects that vary in scale, form, and function, including book shrines, brooches worn on the body, and reliquaries suspended in satchels. Today, such objects are discussed, displayed, and illustrated as static rather than mobile objects that human bodies wore and that accompanied them as they travelled through landscapes animated by changing weather, seasons, and time. Using the frame as a heuristic device, she questions how art historical studies approach medieval art and offers a new paradigm for understanding the role of sacred objects in popular devotion."
