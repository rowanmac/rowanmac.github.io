- id: dawsonAfterlivesTroublesLife2026
  abstract: >-
    Focusing on experiential life stories across a range of forms and practices,
    this book investigates subjectivity, culture and the cultural politics of
    representation as a neglected dimension of conflict transformation in the
    Northern Irish peace process. Interdisciplinary critical perspectives from
    historical cultural studies, oral history and popular-memory theory inform
    close interpretive engagement with life stories in their cultural,
    historical and geographical contexts. This enables exploration of the
    complex temporal dynamics of 'post-conflict' subjectivities in the
    lengthening 'afterlife' of the Troubles, where feelings attached to conflict
    experiences are not 'past' but haunt the present, and memory-work carries
    future-oriented desires for truth, justice and reconciliation. Through case
    studies responding to the evolving peace process through this prism of
    life-storytelling, Afterlives maps a contested history of legacy
    policy-making and approaches to 'dealing with the past', from devolution in
    2005-7 through to the Legacy and Reconciliation Act of 2023.
