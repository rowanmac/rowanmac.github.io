- id: reidIrishPoliticalThought
  abstract: >-
    Moving beyond binary nationalist and unionist narratives of
    nineteenth-century Irish history, this study instead explores political
    thought through ideological battles over government. Drawing on neglected
    pamphlets, political tracts and polemic newspapers, Colin Reid reveals how
    Irish protagonists - unionists and anti-unionists, Catholic
    Emancipationists, Repealers, Tories, Fenians, and federalists - clashed over
    the meaning of representation, sovereignty and the British connection. Reid
    traces how competing constitutional visions, rather than national
    allegiances, drove Ireland's political evolution. From the bitter Union
    debates to the birth of Home Rule, it recovers forgotten arguments about
    parliamentary reform, the 'Irish question' in imperial context and the
    fraught experience of a small nation within a multinational polity. With
    fresh insights into figures such as Daniel O'Connell, Isaac Butt and
    lesser-known polemicists, this study redefines Irish political thought as a
    dynamic struggle for representative government. This title is also available
    as open access on Cambridge Core.
