- id: stathamAbortionIrelandLanguage2026
  abstract: >-
    Providing an in-depth analysis of the diverse discourse types present in the
    fight for women’s bodily autonomy in Ireland over four decades, this book
    explores discourse from the imposition of the Eighth Amendment in 1983 to
    its repeal in 2018 and beyond, adopting a mixed-methods critical linguistic
    approach.By applying models of analysis from across the spectrum of critical
    linguistics, the book maximises the potential of the analytical models
    prominent in critical linguistics and Critical Discourse Analysis (CDA), in
    turn maximising the number of discourse arenas available for
    investigation.Interdisciplinary both in terms of methodology and data, the
    chapters analyse a diverse range of societal texts including traditional
    political campaign discourse and cross-generational pro-choice leaflets. The
    book also assesses the utilisation of pro-choice voices in the contemporary
    discourse arenas of social media and broadcast entertainment, and examines
    politico-legal arenas such as submissions to the Citizens’ Assembly and
    parliamentary speeches. It also scrutinises the abortion rights campaign in
    the north of Ireland through interviews with a range of campaigners.In
    addressing the specific complex issue of abortion rights and exposing
    relevant data to diverse linguistic scrutiny, the book showcases the
    methodological rigour of critical linguistics in original research. Against
    the backdrop of ongoing reproductive rights debates in the USA, Europe and
    internationally, this book is a comprehensive analysis of the linguistic
    strategies of a major social event which continues to resonate across the
    world.
