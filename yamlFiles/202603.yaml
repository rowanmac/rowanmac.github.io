- id: luceyHealthcareNorthernIreland2026
  abstract: >-
    This book focuses on the policies, politics and management of health care in
    Northern Ireland from 1921 to 1973. It explores the development of Northern
    Irish health care from its highly localist and fragmented origins to the
    most centrally managed system within the National Health Service. At the
    core of this analysis is an exploration of the interest groups that were
    progenitors of change or, conversely, strongly resisted reform. The work
    looks at poor law, municipal and voluntary provision in the interwar years.
    The 1940s is focused on, including the experience of war and Northern
    Ireland’s involuntary adoption of the welfare state. The discussion on the
    post-war decades assesses the relationship between health and politics. It
    also identifies how modernising technocratic and managerialist policies of
    the Terence O’Neill administration fragmented unionist health policy in the
    lead-up to the Troubles. Overall, this book offers original insights into
    Northern Irish health care, politics and history.
