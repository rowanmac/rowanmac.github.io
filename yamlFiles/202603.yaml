- id: callananJamesJoycePolitical2026
  abstract: >-
    A major new biography that reveals how politics profoundly shaped Joyce’s
    life, thought and writingsThe young James Joyce (1882–1941) was forged in
    the smithy of Irish political controversies, and he took into his European
    exile a depth of political insight unrivalled among his fellow modernists.
    In this biography of Joyce in his youth and early exile, acclaimed Irish
    historian and biographer Frank Callanan reveals a Joyce who is markedly more
    politically conscious, informed and complex than the Joyce of Richard
    Ellmann’s classic account. Written in a sparkling style and rich with
    historical insights, Callanan’s deeply researched biography is the first
    sustained account of how Joyce’s Irish and European political and cultural
    context shaped his life, thought, and writings.Joyce was eight years old in
    1890 when the O’Shea divorce scandal tore Irish nationalism apart, leading
    to the split in the Irish Parliamentary Party, the death of nationalist
    leader Charles Stewart Parnell, and a long, bitter period dominated by the
    anti-Parnellites. This was the Ireland that Joyce grew up in and rebelled
    against, and which determined his literary direction. Callanan uncovers a
    Joyce who was a highly original and dissenting Irish nationalist, who
    refused to avow or vaunt his nationalism and whose understanding was refined
    by the experience of living in multicultural Trieste with its fraught ethnic
    politics and differing models of statehood. Callanan’s Joyce is as heroic as
    Ellmann’s defiantly modernistic artist but in a more interesting way—a
    writer who didn’t lack political conviction but whose views didn’t yield to
    the expectations of his time.Energizing, witty, profound, and elegant, James
    Joyce: A Political Life is a magisterial biography that will transform how
    readers look at Joyce and his politics.
