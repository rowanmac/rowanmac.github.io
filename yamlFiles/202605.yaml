- id: lennonIrishTownspeopleEarly
  abstract: >-
    Through a series of innovative perspectives, this book examines how early
    modern Irish townspeople experienced the urban world through a range of
    family and associational ties. Migrants inducted through town citizenship
    and marriage bonded more closely as sisters or brothers of confraternities
    and guilds, consolidating parish membership. Civic religion saw the
    integration of religion with town politics and councils, and monastic
    charity of the friars’ hospitals preceded the era of modern municipal
    welfare. In circumstances of the alienation of the long-settled Catholic
    townspeople from the state’s religious and political Reformation in the
    seventeenth century, they drew sustenance from the continuity of
    institutions such as colleges, fraternities and hospitals and forms of
    coexistence with Protestant fellow-citizens. -- .
