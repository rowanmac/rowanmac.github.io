- id: mohrLocalArbitrationCourts2026
  abstract: >-
    The arbitration courts organized by local groups in diverse parts of Ireland
    between 1917 and 1920 have not received the scholarly attention that they
    deserve. Despite their importance to the Irish revolution these local courts
    are often presented as a prelude to the succeeding systems of national
    arbitration courts and the courts of law known as the ‘Dáil courts’. This
    article provides the first dedicated history of these local arbitration
    courts that evaluates their contribution to Irish history without being
    overshadowed by their better-known successors. It argues that local
    arbitration courts were better suited to weather the storm of revolutionary
    conflict than succeeding systems. This article also argues that many of the
    successes often attributed to succeeding systems actually belong to the
    period of the local arbitration courts. These include publicity outside
    Ireland, displacement of rival courts, the prospect of women presiding over
    courts and a reputation for fair treatment of minorities.
