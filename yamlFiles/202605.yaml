- id: urquhartFactorsAvoidabilityMaternal2026
  abstract: >-
    Modern Ireland lacks a comprehensive history of maternal mortality. With the
    mid-twentieth century advent of what Northern Ireland’s leading
    gynaecologist labelled ‘a social obstetric conscience’, maternal mortality
    came to increased levels of prominence. This coincided with the introduction
    of the National Health Service (NHS) in 1948 but reducing the rate of
    maternal mortality took decades in Northern Ireland (NI), with the decline
    being often slower than in other constituent parts of the United Kingdom
    (UK). This article collectively assesses successive government reports
    conducted into maternal mortality in Northern Ireland to gauge the medical
    profession’s views of and approaches to maternal death. With a particular
    emphasis on factors that were deemed preventable, the impact of the National
    Health Service, the reduction in birthing options available to women, as
    well as habitual notions of female culpability encompassing expectant
    mothers, handywomen and midwives, are analysed for the first time in this
    period of Northern Ireland’s history.
