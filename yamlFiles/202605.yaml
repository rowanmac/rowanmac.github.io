- id: gotzCopingGreatIrish2026
  abstract: >-
    Skibbereen has become a byword for famine, frequently appearing in academic
    literature on humanitarian disasters — but almost always as a symbol of
    Irish victimhood. By contrast, this article seeks to demonstrate that the
    town of Skibbereen was a centre of agency and innovation with far-reaching
    impact throughout Ireland and beyond. It examines the hands-on efforts of
    local people to take charge of a dire situation, highlighting three key
    aspects inadequately considered by previous research. First, a Skibbereen
    deputation to London played a crucial role in establishing the British
    Relief Association, the major voluntary aid effort at the time. Secondly, a
    soup house founded in Skibbereen became the model for the most effective
    governmental relief effort in Ireland. Thirdly, Skibbereen was the home of
    an elaborate emigration scheme to rescue starving individuals that was
    launched early and sustained for a long time. This article reveals a
    significant disparity between the widely accepted image of Skibbereen as a
    place of passive suffering and the lesser-known agency and innovation of its
    people. Ultimately, this case study not only sheds light on the recipient
    perspectives and complexities of humanitarian aid, but also serves as a
    testament to the resilience and resourcefulness of local Irish leaders.
