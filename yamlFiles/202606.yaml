- id: molyneuxManyOurBest
  abstract: >-
    The explosive conclusion to Ireland's revolutionary saga ― where former
    comrades turn guns on each other in Dublin's blood-soaked streets and a
    nation's dream of freedom becomes a nightmare of civil war.Many of Our Best
    Lie There explores unforgettable characters and stories, such as the almost
    supernatural warnings ignored before Michael Collins, Ireland's most
    charismatic leader, met his tragic fate. Follow legendary figures like Harry
    Boland, Ernie O'Malley and Joe O'Connor as they navigate betrayal, capture
    and the psychological scars of revolution.Gripping military action unfolds
    from seaborne National Army landings to mass IRA prison escapes, as urban
    guerrilla warfare brings Dublin to its knees and former allies turn their
    guns on each other.Dark historical truths reveal 'The Terror' ― the
    state-sanctioned brutality that averaged more than one frequently botched
    execution per day in January 1923, showing how revolutionary ideals
    corrupted under the pressure of civil war.No other series puts you this
    close to the action, in the trenches and safe houses with the actual
    participants. This isn't just military history ― it's friendship betrayed,
    ideals corrupted and a nation's birth trauma that still echoes today. Think
    Game of Thrones, but it really happened ― in Ireland's bloodiest year.This
    is essential reading for anyone who wants to understand how modern Ireland
    was truly born ― not just in the glory of 1916–1921, but in the ashes of
    civil war.
