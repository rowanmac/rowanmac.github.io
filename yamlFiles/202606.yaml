- id: downhamVikingConnectionsProceedings
  abstract: >-
    Viking Connections is an edited collection representing the most recent
    scholarship in the interdisciplinary study of the Viking Age. The 32 papers
    arise from the Nineteenth Viking Congress which took place in Wales and
    North-West England in July 2022. They focus on new research from across the
    Viking World encompassing Archaeology, History, Literature, Language,
    Place-names, Numismatics, and the History of Art. Themes include Irish Sea
    connections as well wider connections across the Viking World. There is also
    a Congress diary. The title Viking Connections expresses the importance of
    international networks and long-distance patterns of contact, which underlie
    both the Viking Age itself and our contemporary community of
    interdisciplinary scholarship. Contributors include senior academics, early
    career researchers, and museum and heritage professionals.The picture that
    emerges from this volume is of the Viking Age as a vibrant and complex
    period of movement and change. Highlights include James Graham-Campbell's
    survey of the metallic wealth of the Isle of Man, Mark Redknap's
    comprehensive account of Viking Age finds in Wales, Orri Vésteinsson's
    investigation of the effects that the introduction of large amounts of
    silver had on Viking Age society, Elizabeth Pierce's study that tracks the
    tenth- to twelfth-century Scandinavian presence in eastern Scotland whose
    evidence suggests substantial trading activity, Søren Sindbæk's
    demonstration of how radiocarbon calibration curves, when applied to the
    fine-meshed stratigraphy of Ribe, suggest a new chronological framework for
    the beginning of the Viking Age, and Christian Cooijmans' exploration of the
    idea of viking camps as not just military barracks, but sites where all
    aspects of everyday life went on, and which formed the basis of the whole
    viking phenomenon.
