- id: doyleIncestIndependentIreland2026
  abstract: >-
    Despite the burgeoning international literature on the history of sexual
    violence, the topic of incest has received limited attention from
    historians. This article examines hitherto restricted archival files on
    thirty-seven offenders who were convicted of incest in the independent Irish
    state under the Punishment of Incest Act 1908 and, in doing so, provides a
    rare glimpse into exploitative sexual practices within Irish families in the
    decades after independence. The findings show that incest perpetrators were
    effectively a male preserve and that incest was almost always an abusive
    relationship that persisted over an extended period of time. The article
    also reveals that victims were invariably younger than offenders, some
    incest offenses involved alcohol, violence, and threats, many cases resulted
    in pregnancy, motherless children appear to have been vulnerable, and most
    of these crimes were premeditated and non-consensual. The article concludes
    by capturing the limitations of the 1908 Act in neglecting to cover sexual
    acts other than vaginal intercourse and embrace a broader range of family
    relationships.
