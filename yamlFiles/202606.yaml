- id: SubscriptionCulturalInfrastructure2017
  abstract: >-
    This article examines subscription practices in the social and cultural
    economy of the late nineteenth and early twentieth centuries in Ireland and
    beyond, and identifies different types of subscription project. Moving
    beyond understandings of subscription as a fundraising mechanism, it
    demonstrates how subscription lists shaped cultural production, literary
    reputation, and public engagement. Through an analysis of diverse
    subscription schemes – from the Dun Emer Press to the Abbey Theatre and
    Sylvia Beach's Ulysses – the article illuminates how subscription practices
    enabled women's cultural leadership, facilitated proto-diplomacy, and
    strengthened transnational networks spanning Dublin, London, Paris, New
    York, and beyond. By examining subscription as material infrastructure that
    structured the literary field, this study elucidates the mechanisms that
    enabled the Irish Revival's extraordinary international reach and
    demonstrates continuities between Revival practices and modernist publishing
    strategies.
