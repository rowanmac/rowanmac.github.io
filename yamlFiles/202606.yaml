- id: valentiStrumStrumBe2026
  abstract: >-
    Over Bastille Day weekend in July of 1792, nine Irish harpers gathered at
    the Belfast Assembly Rooms. Their performances of traditional Irish music
    were heard by a mostly appreciative audience and transcribed by Edward
    Bunting (1773–1843), a young Anglican church musician from Armagh, whose
    long and distinguished career of collecting Irish music began that weekend.
    This article corrects the common misconception that this event, which has
    come to be known as the 1792 Belfast Harp Festival, was organised by the
    United Irishmen. It suggests instead that manifestations of Welsh and
    Scottish cultural and musical nationalism — specifically the eisteddfod and
    Scots musical museum — were the true antecedents to the Belfast Harp
    Festival.
